name: Deploy to Vercel (Production)

# Declenche a chaque push sur main OU a la demande manuelle.
# Deploie en production. Contourne le Git-integration Vercel (qui peut se casser
# quand plusieurs projets Vercel sont rattaches au meme repo).
#
# Pre-requis : dans GitHub > Settings > Secrets and variables > Actions, ajoute :
#   - VERCEL_TOKEN     (vercel.com/account/tokens, clic "Create", copie)
#   - VERCEL_ORG_ID    (vercel.com/<ton-team>/.../settings > General > Team ID)
#   - VERCEL_PROJECT_ID (dans le projet > Settings > General > Project ID)
#
# Une fois ces 3 secrets ajoutes, chaque push sur main deploie tout seul,
# independamment de l'etat des integrations Git de Vercel.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build + deploy to Vercel
    runs-on: ubuntu-latest
    concurrency:
      group: vercel-prod-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
